# ============================================================
# CI/CD — Build & Deploy Backend Application
# ============================================================
#
# This workflow builds, tests, scans, and deploys the .NET 8
# backend application. It assumes Azure infrastructure already
# exists (managed separately via terraform.yml).
#
# Triggers:
#   - Push to main, develop, or Development
#   - Manual trigger (workflow_dispatch)
#
# What it does:
#   1. Restores .NET dependencies
#   2. Builds the project
#   3. Runs analyzers / tests
#   4. Scans Docker image for vulnerabilities (Trivy)
#   5. Builds Docker image and pushes to existing ACR
#   6. Restarts the existing Azure Web App (pulls latest image)
#   7. Verifies the /health endpoint
#
# Required secrets:
#   AZURE_CREDENTIALS
#     Azure service principal JSON with Contributor role.
#     Create: az ad sp create-for-rbac --name "github-actions-deploy" \
#               --role contributor \
#               --scopes /subscriptions/{subscription-id} \
#               --sdk-auth
#
#   JWT_KEY
#     JWT signing key (32+ characters)
#
#   DB_CONNECTION
#     PostgreSQL connection string
#
#   GOOGLE_CLIENT_ID
#     Google OAuth client ID
#
# ============================================================
name: Deploy Backend Application

on:
  push:
    branches:
      - main
      - develop
      - Development
  workflow_dispatch:        # Manual trigger

env:
  # === Existing Azure resources (created by terraform.yml) ===
  # These are known values for the dev environment.
  # Change these to match your actual Azure resources.
  ACR_NAME: taskmanagementdevacr
  ACR_LOGIN_SERVER: taskmanagementdevacr.azurecr.io
  WEBAPP_NAME: taskmanagement-dev-app
  RESOURCE_GROUP: task-management-dev-rg
  WEBAPP_URL: https://taskmanagement-dev-app.azurewebsites.net

  # === Docker ===
  IMAGE_NAME: task-manager-backend

  # === .NET ===
  DOTNET_VERSION: '8.0.x'

jobs:
  # ============================================================
  # JOB 1: Build, Test & Analyze
  # ============================================================
  build-and-test:
    name: 'Build, Test & Analyze'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      # Run .NET built-in analyzers
      - name: Run .NET analyzers
        run: dotnet build --configuration Release --no-restore --warnaserror

      # Run tests (if test project exists)
      # - name: Run tests
      #   run: dotnet test --configuration Release --no-build --verbosity normal
      #   continue-on-error: true

  # ============================================================
  # JOB 2: Build & Push Docker Image
  # ============================================================
  docker-build-and-push:
    name: 'Build & Push Docker Image'
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Authenticate to ACR via Azure CLI
      # (no admin credentials needed — uses the service principal)
      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & tag Docker image
        run: |
          IMAGE_TAG="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"

          docker build \
            -t "$IMAGE_TAG" \
            -t "$LATEST_TAG" \
            -f Dockerfile \
            .

      # Scan for vulnerabilities BEFORE pushing
      - name: Scan Docker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'   # Don't fail on vulnerabilities (set to '1' to enforce)
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Docker image to ACR
        run: |
          IMAGE_TAG="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest"

          docker push "$IMAGE_TAG"
          docker push "$LATEST_TAG"

  # ============================================================
  # JOB 3: Deploy to Azure Web App
  # ============================================================
  deploy:
    name: 'Deploy to Azure Web App'
    runs-on: ubuntu-latest
    needs: docker-build-and-push

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Update app settings (injects secrets as env vars into the container)
      - name: Configure app settings
        run: |
          az webapp config appsettings set \
            --name ${{ env.WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              Jwt__Key="${{ secrets.JWT_KEY }}" \
              ConnectionStrings__DefaultConnection="${{ secrets.DB_CONNECTION }}" \
              GoogleAuth__ClientId="${{ secrets.GOOGLE_CLIENT_ID }}" \
              ASPNETCORE_ENVIRONMENT=Development \
              ASPNETCORE_URLS=http://+:8080 \
              WEBSITES_PORT=8080

      # Restart the web app so it pulls the newest :latest image
      - name: Restart Web App
        run: |
          az webapp restart \
            --name ${{ env.WEBAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }}

      # Wait for the app to come back up and verify it's healthy
      - name: Verify deployment
        run: |
          echo "Waiting for app to start..."
          sleep 20

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ env.WEBAPP_URL }}/health" || echo "000")

          echo "Health endpoint returned: HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deployment failed — health check returned $HTTP_CODE"
            exit 1
          fi

          echo "✅ Deployment successful!"
          echo "   API available at: ${{ env.WEBAPP_URL }}"
