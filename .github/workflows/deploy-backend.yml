# ============================================================
# CI/CD Pipeline: Terraform + Build & Deploy Backend to Azure
# ============================================================
#
# This workflow fully automates infrastructure provisioning using
# Terraform, then builds and deploys the .NET 8 backend as a
# Docker container to Azure App Service.
#
# GitHub Secrets required (set in repo → Settings → Secrets):
#
#   AZURE_CREDENTIALS
#     Azure service principal JSON with Contributor + AcrPush roles.
#     Create via:
#       az ad sp create-for-rbac --name "github-actions" \
#         --role contributor \
#         --scopes /subscriptions/{subscription-id} \
#         --sdk-auth
#
#   JWT_KEY
#     JWT signing key for production (32+ characters)
#
#   DB_CONNECTION
#     PostgreSQL connection string for production database
#
#   GOOGLE_CLIENT_ID
#     Google OAuth client ID
#
# ============================================================
name: Deploy .NET 8 Backend to Azure

on:
  push:
    branches:
      - main
      - develop
      - Development
    paths:
      - '**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  # Azure
  AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

  # Terraform variables (passed as TF_VAR_*)
  TF_VAR_location: 'Southeast Asia'
  TF_VAR_resource_group_name: 'task-management-prod-rg'
  TF_VAR_acr_name: 'taskmanagementprodacr'
  TF_VAR_app_service_plan_name: 'taskmanagement-prod-plan'
  TF_VAR_web_app_name: 'taskmanagement-prod-app'
  TF_VAR_docker_image_name: 'task-manager-backend'
  TF_VAR_docker_image_tag: ${{ github.sha }}

  # Docker
  IMAGE_NAME: task-manager-backend

  # Terraform directory (relative to git root — Task_Manager-Backend/)
  TF_ROOT: terraform

jobs:
  # ============================================================
  # JOB 1: Terraform — Provision / Update Infrastructure
  # ============================================================
  terraform:
    name: 'Terraform — Provision Infrastructure'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform Outputs
        id: tf-outputs
        run: |
          echo "acr_server=$(terraform output -raw acr_login_server)" >> $GITHUB_OUTPUT
          echo "acr_name=$(terraform output -raw acr_name)" >> $GITHUB_OUTPUT
          echo "web_app_name=$(terraform output -raw web_app_name)" >> $GITHUB_OUTPUT
          echo "web_app_url=$(terraform output -raw web_app_url)" >> $GITHUB_OUTPUT
          echo "resource_group=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT

    outputs:
      acr_server: ${{ steps.tf-outputs.outputs.acr_server }}
      acr_name: ${{ steps.tf-outputs.outputs.acr_name }}
      web_app_name: ${{ steps.tf-outputs.outputs.web_app_name }}
      web_app_url: ${{ steps.tf-outputs.outputs.web_app_url }}
      resource_group: ${{ steps.tf-outputs.outputs.resource_group }}

  # ============================================================
  # JOB 2: Build & Push Docker Image to ACR
  # ============================================================
  build-and-push:
    name: 'Build & Push Docker Image'
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Log in to ACR via Azure CLI
        run: az acr login --name ${{ needs.terraform.outputs.acr_name }}
        # Uses Azure service principal credentials — no admin creds needed.

      - name: Build & Push Docker image
        run: |
          IMAGE_TAG="${{ needs.terraform.outputs.acr_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ needs.terraform.outputs.acr_server }}/${{ env.IMAGE_NAME }}:latest"

          docker build \
            -t "$IMAGE_TAG" \
            -t "$LATEST_TAG" \
            -f Dockerfile \
            .

          docker push "$IMAGE_TAG"
          docker push "$LATEST_TAG"

      # Optional: Scan Docker image for vulnerabilities
      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.terraform.outputs.acr_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================
  # JOB 3: Deploy to Azure Web App
  # ============================================================
  deploy:
    name: 'Deploy to Azure Web App'
    runs-on: ubuntu-latest
    needs: [terraform, build-and-push]

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Configure App Settings & Connection Strings
        run: |
          # Set environment-specific app settings on the Web App
          az webapp config appsettings set \
            --name ${{ needs.terraform.outputs.web_app_name }} \
            --resource-group ${{ needs.terraform.outputs.resource_group }} \
            --settings \
              Jwt__Key="${{ secrets.JWT_KEY }}" \
              ConnectionStrings__DefaultConnection="${{ secrets.DB_CONNECTION }}" \
              GoogleAuth__ClientId="${{ secrets.GOOGLE_CLIENT_ID }}" \
              ASPNETCORE_ENVIRONMENT=Production \
              ASPNETCORE_URLS=http://+:8080 \
              WEBSITES_PORT=8080

      - name: Restart Web App (pick up latest image)
        run: |
          az webapp restart \
            --name ${{ needs.terraform.outputs.web_app_name }} \
            --resource-group ${{ needs.terraform.outputs.resource_group }}

      - name: Verify Deployment
        run: |
          echo "Waiting for app to start..."
          sleep 20
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ needs.terraform.outputs.web_app_url }}/health" || echo "000")
          echo "Health endpoint returned: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Deployment verification failed — health check returned $HTTP_CODE"
            exit 1
          fi
          echo "✅ Deployment successful — API is healthy at ${{ needs.terraform.outputs.web_app_url }}"
