# ============================================================
# CI/CD Pipeline: Terraform IaC + Build & Deploy (DEV)
# ============================================================
#
# This workflow is for the DEVELOPMENT environment.
# It runs Terraform first, then builds and deploys.
#
# GitHub Secrets required (set in repo → Settings → Secrets):
#
#   AZURE_CREDENTIALS
#     Azure service principal JSON with Contributor + AcrPush roles.
#     Create via:
#       az ad sp create-for-rbac --name "github-actions-dev" \
#         --role contributor \
#         --scopes /subscriptions/{subscription-id} \
#         --sdk-auth
#
#   DEV_JWT_KEY
#     JWT signing key for dev environment (32+ characters)
#
#   DEV_DB_CONNECTION
#     PostgreSQL connection string for dev database
#
#   DEV_GOOGLE_CLIENT_ID
#     Google OAuth client ID for dev
#
# ============================================================
name: Deploy DEV Environment

on:
  push:
    branches: [develop]
    paths:
      - '**'                                    # entire repo (terraform + backend code)
      - '.github/workflows/deploy-dev.yml'       # workflow changes
  workflow_dispatch:  # Manual trigger

env:
  # Azure
  AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

  # Terraform
  TF_VAR_location: 'East US'
  TF_VAR_resource_group_name: 'task-management-dev-rg'
  TF_VAR_acr_name: 'taskmanagementdevacr'
  TF_VAR_app_service_plan_name: 'taskmanagement-dev-plan'
  TF_VAR_web_app_name: 'taskmanagement-dev-app'
  TF_VAR_docker_image_name: 'task-manager-backend'
  TF_VAR_docker_image_tag: ${{ github.sha }}

  # Docker
  IMAGE_NAME: task-manager-backend

  # Terraform directory (relative to git root — Task_Manager-Backend/)
  TF_ROOT: terraform

jobs:
  # ============================================================
  # JOB 1: Terraform — Provision / Update Infrastructure
  # ============================================================
  terraform:
    name: 'Terraform — Provision Infrastructure'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init
        # Initialises Terraform, downloads the AzureRM provider, and
        # prepares the working directory. State is stored locally by default.
        # For teams, configure the "backend" block in main.tf to use
        # Azure Storage for shared state.

      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true
        # Ensures .tf files follow standard formatting conventions.

      - name: Terraform Validate
        run: terraform validate
        # Checks that the configuration is syntactically valid.

      - name: Terraform Plan
        run: terraform plan -out=tfplan
        # Shows what resources will be created/modified/destroyed.
        # The -out flag saves the plan to apply it later.

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        # Applies the plan — creates or updates Azure resources.
        # -auto-approve skips the interactive confirmation prompt.

      - name: Capture Terraform Outputs
        id: tf-outputs
        run: |
          echo "acr_server=$(terraform output -raw acr_login_server)" >> $GITHUB_OUTPUT
          echo "web_app_name=$(terraform output -raw web_app_name)" >> $GITHUB_OUTPUT
          echo "web_app_url=$(terraform output -raw web_app_url)" >> $GITHUB_OUTPUT
        # Captures Terraform output values so they can be used
        # by subsequent jobs.

    outputs:
      acr_server: ${{ steps.tf-outputs.outputs.acr_server }}
      web_app_name: ${{ steps.tf-outputs.outputs.web_app_name }}
      web_app_url: ${{ steps.tf-outputs.outputs.web_app_url }}

  # ============================================================
  # JOB 2: Build & Push Docker Image
  # ============================================================
  build-and-push:
    name: 'Build & Push Docker Image to ACR'
    runs-on: ubuntu-latest
    needs: terraform
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Log in to ACR via Azure CLI
        run: az acr login --name ${{ env.TF_VAR_acr_name }}
        # Uses the Azure service principal to authenticate with ACR.
        # No admin credentials needed — Azure CLI handles token exchange.
        # This works because the service principal has AcrPush role.

      - name: Build & Push Docker image
        run: |
          IMAGE_TAG="${{ needs.terraform.outputs.acr_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          LATEST_TAG="${{ needs.terraform.outputs.acr_server }}/${{ env.IMAGE_NAME }}:latest"

          docker build \
            -t "$IMAGE_TAG" \
            -t "$LATEST_TAG" \
            -f Dockerfile \
            .

          docker push "$IMAGE_TAG"
          docker push "$LATEST_TAG"



  # ============================================================
  # JOB 3: Deploy to Azure Web App
  # ============================================================
  deploy:
    name: 'Deploy to Azure Web App'
    runs-on: ubuntu-latest
    needs: [terraform, build-and-push]
    environment: development

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name ${{ needs.terraform.outputs.web_app_name }} \
            --resource-group ${{ env.TF_VAR_resource_group_name }} \
            --settings \
              Jwt__Key="${{ secrets.DEV_JWT_KEY }}" \
              ConnectionStrings__DefaultConnection="${{ secrets.DEV_DB_CONNECTION }}" \
              GoogleAuth__ClientId="${{ secrets.DEV_GOOGLE_CLIENT_ID }}" \
              ASPNETCORE_ENVIRONMENT=Development \
              ASPNETCORE_URLS=http://+:8080 \
              WEBSITES_PORT=8080
        # Sets application settings WITHOUT restarting the app.
        # These override appsettings.json at runtime.

      - name: Restart Web App (pick up latest image)
        run: |
          az webapp restart \
            --name ${{ needs.terraform.outputs.web_app_name }} \
            --resource-group ${{ env.TF_VAR_resource_group_name }}
        # Restarts the web app so it pulls the newest Docker image
        # from ACR (with the :latest tag or specific sha).

      - name: Verify Deployment
        run: |
          sleep 15
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            "${{ needs.terraform.outputs.web_app_url }}/health"
        # Waits for the app to start, then hits the /health endpoint.
        # If the HTTP status is 200, the deployment succeeded.
